name: superRight
options:
  bundleIdPrefix: com.smiler
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    # Apple Developer Team ID（10 位）。换成你自己的即可。
    DEVELOPMENT_TEAM: "6SP59MDKXK"

targets:
  superRight:
    type: application
    platform: macOS
    sources:
      - path: App
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.smiler.superRight
        INFOPLIST_FILE: App/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/superRight.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
    dependencies:
      - target: FinderExtension
        embed: true
      - target: superRightHelper
        embed: true
        codeSign: true
        copyFiles:
          destination: wrapper
          subpath: Contents/Library/Helpers

  FinderExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: FinderExtension
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.smiler.superRight.FinderExtension
        INFOPLIST_FILE: FinderExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: FinderExtension/FinderExtension.entitlements
        ENABLE_HARDENED_RUNTIME: YES

  # 非沙盒后台小助手：扩展把请求写入 App Group 后唤起它，由它用 -e 直接把命令
  # 传给终端（不走脚本文件、不被沙盒丢参数），从而无确认弹窗地启动 http-server。
  superRightHelper:
    type: application
    platform: macOS
    sources:
      - path: Helper
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.smiler.superRight.Helper
        INFOPLIST_FILE: Helper/Info.plist
        CODE_SIGN_ENTITLEMENTS: Helper/superRightHelper.entitlements
        ENABLE_HARDENED_RUNTIME: YES
